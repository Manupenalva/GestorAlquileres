services:
  backend:
    container_name: tp-backend
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      APP_CORS_ORIGINS: http://localhost:20300
    networks:
      - app-network

  frontend:
    container_name: tp-frontend
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "20300:80"
    networks:
      - app-network

  adminer:
    container_name: tp-adminer
    image: adminer:4.8.1
    restart: unless-stopped
    ports:
      - "20302:8080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
