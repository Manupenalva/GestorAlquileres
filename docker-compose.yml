services:
  backend:
    container_name: tp-backend
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      APP_CORS_ORIGINS: "${EXTERNAL_URL}"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: gestion
      DB_USER: gestion_user
      DB_PASSWORD: "${DB_APP_PASSWORD}"
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    container_name: tp-frontend
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${INGRESS_PORT}:80"
    networks:
      - app-network

  adminer:
    container_name: tp-adminer
    image: adminer:4.8.1
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    ports:
      - "${ADMINER_EXTERNAL_PORT}:8080"
    networks:
      - app-network

  db:
    container_name: tp-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestion
      POSTGRES_USER: gestion_user
      POSTGRES_PASSWORD: "${DB_APP_PASSWORD}"
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    volumes:
      - "${VOLUME_DIR}:/var/lib/postgresql/data"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
